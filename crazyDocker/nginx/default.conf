# تنظیم وب‌سوکت
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen 443 ssl;
    server_name crazyness.com;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    server_tokens off;

    # نکته: چون سورس کد در انجینکس نیست، روت را مجازی در نظر می‌گیریم
    root /var/www/html/public;
    index index.php;

    # ۱. پردازش اصلی تمام درخواست‌ها (API, GraphQL, Telescope, etc)
    location / {
        include fastcgi_params;
        # مسیر فایل داخل کانتینر app است، نه انجینکس
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        # نام سرویس در داکر کامپوز شما 'app' است
        fastcgi_pass app:9000;
        
        # تنظیمات CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        fastcgi_read_timeout 600;
    }

    # ۲. استریم ویدیو (فقط این پوشه باید بین دو کانتینر مشترک (Shared) باشد)
    location /storage/ {
        alias /var/www/storage/;
        sendfile on;
        tcp_nopush on;
        add_header Accept-Ranges bytes;
        access_log off;
        expires 30d;
    }
}

# ۳. سرور وب‌سوکت (Reverb / Socket.io)
server {
    listen 443 ssl;
    server_name sock.crazyness.com;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    location / {
        # پورت پیش‌فرض ریورب معمولاً 8080 است
        proxy_pass http://app:8080; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        
        proxy_read_timeout 7d;
        proxy_send_timeout 7d;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}